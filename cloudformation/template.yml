AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Secure S3 bucket with fine-grained IAM access controls for read/write operations.
  Designed for Lambda and service-based access.

Parameters:
  Environment:
    Type: String
    AllowedValues:
      - dev
      - qa
      - prod

  # IAM Role ARN that will be granted access (e.g., Lambda role)
  AccessRoleArn:
    Type: String
    Description: ARN of IAM Role (e.g., Lambda execution role) that needs S3 access

Resources:

  MyS3Bucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

    Properties:
      BucketName: !Sub "${AWS::AccountId}-${AWS::Region}-my-s3-bucket-${Environment}"

      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced

      VersioningConfiguration:
        Status: Enabled

      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
              KMSMasterKeyID: alias/aws/s3

      LifecycleConfiguration:
        Rules:
          - Id: TransitionRule
            Status: Enabled
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 30
              - StorageClass: GLACIER_IR
                TransitionInDays: 60
            ExpirationInDays: 365

          - Id: NonCurrentVersionCleanup
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 90

      Tags:
        - Key: Environment
          Value: !Ref Environment

  # Bucket Policy with Fine-Grained Access
  MyS3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref MyS3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:

          # Enforce HTTPS
          - Sid: EnforceSSL
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !Sub "${MyS3Bucket.Arn}"
              - !Sub "${MyS3Bucket.Arn}/*"
            Condition:
              Bool:
                aws:SecureTransport: false

          # READ ACCESS (GetObject)
          - Sid: AllowReadAccess
            Effect: Allow
            Principal:
              AWS: !Ref AccessRoleArn
            Action:
              - s3:GetObject
            Resource:
              - !Sub "${MyS3Bucket.Arn}/*"

          # WRITE ACCESS (PutObject)
          - Sid: AllowWriteAccess
            Effect: Allow
            Principal:
              AWS: !Ref AccessRoleArn
            Action:
              - s3:PutObject
            Resource:
              - !Sub "${MyS3Bucket.Arn}/*"

          # LIST ACCESS (ListBucket required for many SDK ops)
          - Sid: AllowListAccess
            Effect: Allow
            Principal:
              AWS: !Ref AccessRoleArn
            Action:
              - s3:ListBucket
            Resource:
              - !Sub "${MyS3Bucket.Arn}"

          # 🧹 OPTIONAL DELETE ACCESS (enable if needed)
          - Sid: AllowDeleteAccess
            Effect: Allow
            Principal:
              AWS: !Ref AccessRoleArn
            Action:
              - s3:DeleteObject
            Resource:
              - !Sub "${MyS3Bucket.Arn}/*"

Outputs:
  S3BucketName:
    Value: !Ref MyS3Bucket

  S3BucketArn:
    Value: !GetAtt MyS3Bucket.Arn