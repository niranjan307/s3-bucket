name: CI + Manual Release (Best Practice)

on:
  push:
    branches:
      - main
      - feature/*

  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0)"
        required: true

jobs:

  # =========================
  # 🧪 CI JOB
  # =========================
  ci:
    runs-on: ubuntu-latest

    outputs:
      commit_sha: ${{ steps.commit.outputs.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Capture commit SHA
        id: commit
        run: echo "sha=${GITHUB_SHA}" >> $GITHUB_OUTPUT

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cfn-lint
        run: pip install cfn-lint

      - name: Lint template
        run: cfn-lint cloudformation/template.yml

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Validate template
        run: |
          aws cloudformation validate-template \
            --template-body file://cloudformation/template.yml

      - name: CI Success Message
        run: |
          echo "✅ CI SUCCESS"
          echo "Commit: $GITHUB_SHA"
          echo ""
          echo "👉 To create release:"
          echo "Go to Actions → Run workflow → Enter tag"

  # =========================
  # 🚀 RELEASE JOB
  # =========================
  release:
    runs-on: ubuntu-latest
    needs: ci

    if: ${{ github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout exact commit from CI
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.ci.outputs.commit_sha }}

      - name: Check if tag exists
        run: |
          if git rev-parse "${{ inputs.tag }}" >/dev/null 2>&1; then
            echo "❌ Tag already exists"
            exit 1
          fi

      - name: Create tag from CI commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git tag ${{ inputs.tag }}
          git push origin ${{ inputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: Release ${{ inputs.tag }}
          generate_release_notes: true